<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UnaNet // Player Profile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; background-color: #0b0c10; color: #f1f5f9; display: flex; flex-direction: column; height: 100vh; }
        
        /* MATCHING TOP HEADER */
        header { background: #151821; border-bottom: 2px solid #232a36; display: flex; align-items: center; justify-content: space-between; padding: 12px 20px; shrink: 0; }
        .logo { font-size: 22px; font-weight: 900; color: #ff5722; text-transform: uppercase; cursor: pointer; text-decoration: none; }
        .nav-links { display: flex; gap: 15px; align-items: center; }
        .nav-item { color: #94a3b8; text-decoration: none; font-weight: 600; font-size: 14px; display: flex; align-items: center; gap: 6px; }
        .nav-item:hover, .nav-item.active { color: #ff5722; }

        /* PROFILE WORKSPACE */
        .profile-container { flex-grow: 1; overflow-y: auto; background-color: #0b0c10; display: flex; flex-direction: column; }
        .banner-space { height: 160px; background: linear-gradient(135deg, #1f2430 0%, #ff5722 100%); position: relative; shrink: 0; }
        
        .profile-header-card { padding: 0 20px; position: relative; transform: translateY(-40px); display: flex; align-items: flex-end; gap: 15px; margin-bottom: -20px; }
        .huge-avatar { width: 90px; height: 90px; border-radius: 50%; border: 4px solid #0b0c10; background-color: #151821; object-fit: cover; }
        
        .identity-box { margin-bottom: 5px; }
        .display-username { font-size: 22px; font-weight: 800; color: white; margin: 0; }
        .display-tagline { color: #ff5722; font-weight: 700; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }
        
        .content-split { padding: 20px; display: grid; grid-template-columns: 1fr; gap: 20px; }
        @media (min-width: 768px) { .content-split { grid-template-columns: 1fr 2.5fr; gap: 30px; padding: 40px; } }
        
        .info-panel { background-color: #151821; border: 1px solid #232a36; border-radius: 12px; padding: 20px; height: fit-content; }
        .panel-heading { font-size: 12px; font-weight: bold; text-transform: uppercase; color: #94a3b8; margin-bottom: 8px; }
        .bio-text { font-size: 14px; line-height: 1.5; color: #cbd5e1; background: #0b0c10; padding: 12px; border-radius: 8px; border: 1px solid #1e2330; margin: 0 0 15px 0; }
        .stat-row { display: flex; align-items: center; gap: 10px; font-size: 13px; color: #94a3b8; margin-top: 8px; }
        .stat-row i { color: #ff5722; width: 16px; }

        /* RELEASES GRID */
        .showcase-title { font-size: 18px; font-weight: 700; color: white; margin: 0 0 15px 0; display: flex; align-items: center; gap: 8px; }
        .showcase-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 15px; }
        @media (max-width: 480px) { .showcase-grid { grid-template-columns: 1fr; } }
        .showcase-card { background-color: #151821; border: 1px solid #232a36; border-radius: 10px; overflow: hidden; }
        .showcase-img { width: 100%; height: 160px; object-fit: cover; background: #0b0c10; }
        .showcase-meta { padding: 12px; font-weight: 600; font-size: 14px; color: white; }
    </style>
</head>
<body>

    <header>
        <a href="/" class="logo">UnaNet</a>
        <div class="nav-links">
            <a href="/" class="nav-item"><i class="fa-solid fa-image"></i> Feed</a>
            <a href="/rooms" class="nav-item"><i class="fa-solid fa-gamepad"></i> Rooms</a>
            <a href="/rules" class="nav-item"><i class="fa-solid fa-book"></i> Rules</a>
            <a href="/settings" class="nav-item" id="navSettings" style="display:none;"><i class="fa-solid fa-gear"></i> Settings</a>
        </div>
    </header>

    <div class="profile-container">
        <div class="banner-space"></div>
        
        <div class="profile-header-card">
            <img src="https://i.imgur.com/6VB896R.png" class="huge-avatar" id="playerAvatar">
            <div class="identity-box">
                <h1 class="display-username" id="playerName">@Player</h1>
                <div class="display-tagline" id="playerBadge">Just Una Player</div>
            </div>
        </div>

        <div class="content-split">
            <div class="info-panel">
                <div class="panel-heading">Biography</div>
                <p class="bio-text" id="playerBio">Sourcing biography variables...</p>
                
                <div class="panel-heading" style="margin-top: 20px;">Grid Metadata</div>
                <div class="stat-row"><i class="fa-solid fa-calendar-days"></i> <span id="playerJoined">Initialized: --</span></div>
                <div class="stat-row"><i class="fa-solid fa-shield-halved"></i> <span id="playerSecurity">2FA: Inactive</span></div>
            </div>

            <div>
                <h3 class="showcase-title"><i class="fa-solid fa-folder-open" style="color:#ff5722;"></i> Player Publications</h3>
                <div class="showcase-grid" id="playerShowcase">
                    <p style="color:#94a3b8;">Scanning database cluster nodes...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = "/";
        const pathSegments = window.location.pathname.split('/');
        const targetUsername = pathSegments[pathSegments.length - 1];

        if (localStorage.getItem('rec_user')) {
            document.getElementById('navSettings').style.display = 'block';
        }

        async function fetchProfileData() {
            try {
                const res = await fetch(API_BASE_URL + `api/user/profile/${targetUsername}`);
                const data = await res.json();
                
                if (!data.success) {
                    document.getElementById('playerName').innerText = "Player Disconnected";
                    document.getElementById('playerBio').innerText = "This node does not exist in the database arrays.";
                    return;
                }

                document.getElementById('playerName').innerText = `@${data.profile.username}`;
                document.getElementById('playerAvatar').src = data.profile.pfpUrl;
                document.getElementById('playerBadge').innerText = data.profile.status;
                document.getElementById('playerBio').innerText = data.profile.bio;
                document.getElementById('playerJoined').innerText = `Initialized: ${new Date(data.profile.joined).toLocaleDateString()}`;

                const feedRes = await fetch(API_BASE_URL + 'api/photos');
                const feedData = await feedRes.json();
                const showcase = document.getElementById('playerShowcase');
                
                if (feedData.success) {
                    const playerPosts = feedData.photos.filter(p => p.username.toLowerCase() === targetUsername.toLowerCase());
                    
                    if (playerPosts.length === 0) {
                        showcase.innerHTML = `<p style="color:#475569; font-size:14px;">This player hasn't published any concepts yet.</p>`;
                        return;
                    }

                    showcase.innerHTML = "";
                    playerPosts.forEach(post => {
                        const card = document.createElement('div');
                        card.className = "showcase-card";
                        card.innerHTML = `
                            <img src="${post.imageUrl}" class="showcase-img" onerror="this.style.display='none'">
                            <div class="showcase-meta">${post.title}</div>
                        `;
                        showcase.appendChild(card);
                    });
                }
            } catch(e) {
                document.getElementById('playerShowcase').innerHTML = `<p style="color:#f44336;">Failed to connect to data loops.</p>`;
            }
        }

        window.onload = fetchProfileData;
    </script>
</body>
</html>
