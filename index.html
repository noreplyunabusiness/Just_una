<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UnaNet // The Universe</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0b0c10; color: #f1f5f9; display: flex; height: 100vh; overflow: hidden; }
        
        /* SIDEBAR NAVIGATION */
        .sidebar { width: 260px; background-color: #151821; border-right: 1px solid #232a36; display: flex; flex-direction: column; padding: 20px 0; }
        .logo { font-size: 26px; font-weight: 900; color: #ff5722; text-transform: uppercase; padding: 0 25px 30px 25px; letter-spacing: 1px; cursor: pointer; }
        .nav-links { flex-grow: 1; display: flex; flex-direction: column; gap: 5px; }
        .nav-item { padding: 15px 25px; color: #94a3b8; text-decoration: none; font-size: 16px; font-weight: 600; display: flex; align-items: center; gap: 15px; cursor: pointer; transition: 0.2s; }
        .nav-item:hover, .nav-item.active { background-color: rgba(255, 87, 34, 0.1); color: #ff5722; border-left: 4px solid #ff5722; }
        .nav-item i { font-size: 20px; width: 24px; text-align: center; }
        
        .auth-panel { padding: 20px 25px; border-top: 1px solid #232a36; }
        .auth-panel button { width: 100%; margin-bottom: 10px; padding: 12px; background: transparent; border: 1px solid #334155; color: #f1f5f9; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .auth-panel button:hover { border-color: #ff5722; color: #ff5722; }
        .auth-panel .btn-signup { background-color: #ff5722; border: none; color: white; }
        .auth-panel .btn-signup:hover { background-color: #e64a19; color: white; }

        .user-profile-mini { display: flex; align-items: center; gap: 12px; cursor: pointer; padding: 10px; border-radius: 8px; transition: 0.2s; }
        .user-profile-mini:hover { background-color: #1f2430; }
        .user-profile-mini img { width: 40px; height: 40px; border-radius: 50%; border: 2px solid #ff5722; object-fit: cover; }
        .user-profile-mini div { display: flex; flex-direction: column; }
        .user-name { font-weight: bold; color: white; font-size: 14px; }
        .user-tag { font-size: 11px; color: #ff5722; font-weight: bold; }

        /* MAIN CONTENT AREA */
        .main-content { flex-grow: 1; overflow-y: auto; padding: 30px 40px; background-color: #0b0c10; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .page-title { font-size: 24px; margin: 0; color: white; }
        .create-btn { background-color: #ff5722; color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 8px; }
        
        /* MASONRY / GRID LAYOUT */
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
