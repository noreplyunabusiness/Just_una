<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UnaNet // The Universe</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background-color: #0b0c10; color: #f1f5f9; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 250px; background-color: #151821; border-right: 1px solid #232a36; display: flex; flex-direction: column; padding: 20px 0; }
        .logo { font-size: 26px; font-weight: 900; color: #ff5722; text-transform: uppercase; padding: 0 25px 30px 25px; cursor: pointer; }
        .nav-links { flex-grow: 1; display: flex; flex-direction: column; gap: 5px; }
        .nav-item { padding: 15px 25px; color: #94a3b8; text-decoration: none; font-size: 16px; font-weight: 600; display: flex; align-items: center; gap: 15px; }
        .nav-item:hover, .nav-item.active { background-color: rgba(255, 87, 34, 0.1); color: #ff5722; }
        .auth-panel { padding: 20px 25px; border-top: 1px solid #232a36; }
        .auth-panel button { width: 100%; margin-bottom: 10px; padding: 12px; background: transparent; border: 1px solid #334155; color: #f1f5f9; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-signup { background-color: #ff5722 !important; border: none !important; color: white !important; }
        .main-content { flex-grow: 1; overflow-y: auto; padding: 30px; background-color: #0b0c10; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .page-title { font-size: 24px; margin: 0; }
        .create-btn { background-color: #ff5722; color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .post-card { background-color: #151821; border: 1px solid #232a36; border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; cursor: pointer; }
        .post-img { width: 100%; height: 180px; object-fit: cover; background: #0b0c10; }
        .post-info { padding: 15px; }
        .post-title { font-weight: bold; font-size: 15px; color: white; margin-bottom: 5px; }
        .post-author { font-size: 12px; color: #ff5722; font-weight: bold; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; justify-content: center; align-items: center; z-index: 1000; display: none; }
        .modal-overlay.active { display: flex; }
        .auth-card { background: #151821; padding: 30px; border-radius: 12px; width: 100%; max-width: 350px; position: relative; border: 1px solid #232a36; }
        .close-btn { position: absolute; top: 15px; right: 20px; background: none; border: none; color: #94a3b8; font-size: 24px; cursor: pointer; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; color: #94a3b8; font-size: 13px; margin-bottom: 5px; }
        .form-group input, .form-group textarea { width: 100%; padding: 10px; background: #0b0c10; border: 1px solid #232a36; color: white; border-radius: 8px; box-sizing: border-box; }
        .action-btn { width: 100%; padding: 12px; background: #ff5722; border: none; color: white; font-weight: bold; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo" onclick="location.reload()">Unanet</div>
        <div class="nav-links">
            <div class="nav-item active"><i class="fa-solid fa-image"></i> Feed</div>
            <a href="/rooms" class="nav-item" style="text-decoration:none;"><i class="fa-solid fa-gamepad"></i> Rooms</a>
            <a href="/rules" class="nav-item" style="text-decoration:none;"><i class="fa-solid fa-book"></i> Guidelines</a>
            <a href="/settings" class="nav-item" id="navSettings" style="display:none; text-decoration:none;"><i class="fa-solid fa-gear"></i> Settings</a>
        </div>
        <div class="auth-panel" id="loggedOutNav">
            <button onclick="openModal('loginModal')">Log In</button>
            <button class="btn-signup" onclick="openModal('signupModal')">Sign Up</button>
        </div>
        <div class="auth-panel" id="loggedInNav" style="display:none;">
            <div style="display:flex; align-items:center; gap:10px; cursor:pointer;" id="userProfileBtn">
                <img src="" id="sidebarPfp" style="width:35px; height:35px; border-radius:50%; object-fit:cover; border:1px solid #ff5722;">
                <span id="sidebarUsername" style="font-weight:bold; font-size:14px;">Player</span>
            </div>
            <button style="margin-top:15px; border-color:#f44336; color:#f44336;" onclick="logout()">Logout</button>
        </div>
    </div>

    <div class="main-content">
        <div class="top-bar">
            <h1 class="page-title">Community Feed</h1>
            <button class="create-btn" id="uploadBtn" style="display:none;" onclick="openModal('uploadModal')">Publish</button>
        </div>
        <div class="grid-container" id="photoFeed">
            <p style="color:#94a3b8;">Loading feed network...</p>
        </div>
    </div>

    <div id="uploadModal" class="modal-overlay"><div class="auth-card"><button class="close-btn" onclick="closeModal('uploadModal')">&times;</button><h2>Publish</h2><div class="form-group"><label>Image Link</label><input type="text" id="postImgUrl"></div><div class="form-group"><label>Title</label><input type="text" id="postTitle"></div><div class="form-group"><label>Caption</label><textarea id="postCaption" rows="2"></textarea></div><button class="action-btn" onclick="submitPhoto()">Send</button></div></div>
    <div id="loginModal" class="modal-overlay"><div class="auth-card"><button class="close-btn" onclick="closeModal('loginModal')">&times;</button><h2>Log In</h2><form id="loginForm"><div class="form-group"><label>Username</label><input type="text" id="loginUser" required></div><div class="form-group"><label>Password</label><input type="password" id="loginPass" required></div><button type="submit" class="action-btn">Login</button></form></div></div>
    <div id="signupModal" class="modal-overlay"><div class="auth-card"><button class="close-btn" onclick="closeModal('signupModal')">&times;</button><h2>Sign Up</h2><form id="signupForm"><div class="form-group"><label>Username</label><input type="text" id="signupUser" required></div><div class="form-group"><label>Email</label><input type="email" id="signupEmail" required></div><div class="form-group"><label>Password</label><input type="password" id="signupPass" required></div><div class="form-group"><label>Key</label><input type="password" id="signupKey" required placeholder="swiper no swiping"></div><button type="submit" class="action-btn">Register</button></form></div></div>

    <script>
        const API_BASE_URL = "https://rec-una.onrender.com";
        let currentUser = localStorage.getItem('rec_user') || null;

        function initSession() {
