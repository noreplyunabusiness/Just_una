<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UnaNet // The Universe</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0b0c10; color: #f1f5f9; display: flex; height: 100vh; overflow: hidden; }
        
        /* SIDEBAR NAVIGATION */
        .sidebar { width: 260px; background-color: #151821; border-right: 1px solid #232a36; display: flex; flex-direction: column; padding: 20px 0; }
        .logo { font-size: 26px; font-weight: 900; color: #ff5722; text-transform: uppercase; padding: 0 25px 30px 25px; letter-spacing: 1px; cursor: pointer; }
        .nav-links { flex-grow: 1; display: flex; flex-direction: column; gap: 5px; }
        .nav-item { padding: 15px 25px; color: #94a3b8; text-decoration: none; font-size: 16px; font-weight: 600; display: flex; align-items: center; gap: 15px; cursor: pointer; transition: 0.2s; }
        .nav-item:hover, .nav-item.active { background-color: rgba(255, 87, 34, 0.1); color: #ff5722; border-left: 4px solid #ff5722; }
        .nav-item i { font-size: 20px; width: 24px; text-align: center; }
        
        .auth-panel { padding: 20px 25px; border-top: 1px solid #232a36; }
        .auth-panel button { width: 100%; margin-bottom: 10px; padding: 12px; background: transparent; border: 1px solid #334155; color: #f1f5f9; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .auth-panel button:hover { border-color: #ff5722; color: #ff5722; }
        .auth-panel .btn-signup { background-color: #ff5722; border: none; color: white; }
        .auth-panel .btn-signup:hover { background-color: #e64a19; color: white; }

        .user-profile-mini { display: flex; align-items: center; gap: 12px; cursor: pointer; padding: 10px; border-radius: 8px; transition: 0.2s; }
        .user-profile-mini:hover { background-color: #1f2430; }
        .user-profile-mini img { width: 40px; height: 40px; border-radius: 50%; border: 2px solid #ff5722; object-fit: cover; }
        .user-profile-mini div { display: flex; flex-direction: column; }
        .user-name { font-weight: bold; color: white; font-size: 14px; }
        .user-tag { font-size: 11px; color: #ff5722; font-weight: bold; }

        /* MAIN CONTENT AREA */
        .main-content { flex-grow: 1; overflow-y: auto; padding: 30px 40px; background-color: #0b0c10; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .page-title { font-size: 24px; margin: 0; color: white; }
        .create-btn { background-color: #ff5722; color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 8px; }
        
        /* MASONRY / GRID LAYOUT */
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        
        .post-card { background-color: #151821; border: 1px solid #232a36; border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; transition: transform 0.2s; cursor: pointer; }
        .post-card:hover { transform: translateY(-3px); border-color: #334155; }
        .post-img { width: 100%; height: 200px; object-fit: cover; background: #0b0c10; border-bottom: 1px solid #232a36; }
        .post-info { padding: 15px; }
        .post-title { font-weight: bold; font-size: 15px; margin-bottom: 5px; color: white; }
        .post-author { font-size: 12px; color: #94a3b8; display: flex; align-items: center; gap: 6px; }
        .post-author img { width: 20px; height: 20px; border-radius: 50%; }

        /* MODALS */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; justify-content: center; align-items: center; z-index: 1000; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .auth-card { background: #151821; padding: 30px; border-radius: 12px; width: 100%; max-width: 400px; position: relative; border: 1px solid #232a36; }
        .close-btn { position: absolute; top: 15px; right: 20px; background: none; border: none; color: #94a3b8; font-size: 24px; cursor: pointer; }
        
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; color: #94a3b8; font-size: 13px; margin-bottom: 5px; font-weight: bold; }
        .form-group input, .form-group textarea { width: 100%; padding: 12px; background: #0b0c10; border: 1px solid #232a36; color: white; border-radius: 8px; box-sizing: border-box; }
        .action-btn { width: 100%; padding: 12px; background: #ff5722; border: none; color: white; font-weight: bold; border-radius: 8px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo">UnaNet</div>
        <div class="nav-links">
            <div class="nav-item active" onclick="location.reload()"><i class="fa-solid fa-image"></i> Feed</div>
            <a href="/rooms" class="nav-item" style="text-decoration:none;"><i class="fa-solid fa-gamepad"></i> Rooms</a>
            <a href="/rules" class="nav-item" style="text-decoration:none;"><i class="fa-solid fa-book"></i> Guidelines</a>
            <a href="/settings" class="nav-item" id="navSettings" style="display:none; text-decoration:none;"><i class="fa-solid fa-gear"></i> Settings</a>
        </div>
        
        <div class="auth-panel" id="loggedOutNav">
            <button onclick="openModal('loginModal')">Log In</button>
            <button class="btn-signup" onclick="openModal('signupModal')">Sign Up</button>
        </div>
        
        <div class="auth-panel" id="loggedInNav" style="display:none;">
            <div class="user-profile-mini" onclick="logout()">
                <img src="https://i.imgur.com/6VB896R.png" id="sidebarPfp">
                <div>
                    <span class="user-name" id="sidebarUsername">Player</span>
                    <span class="user-tag"><i class="fa-solid fa-arrow-right-from-bracket"></i> Logout</span>
                </div>
            </div>
        </div>
    </div>

    <div class="main-content">
        <div class="top-bar">
            <h1 class="page-title">Community Feed</h1>
            <button class="create-btn" id="uploadBtn" style="display:none;" onclick="openModal('uploadModal')"><i class="fa-solid fa-plus"></i> Publish Concept</button>
        </div>

        <div class="grid-container" id="photoFeed">
            <p style="color:#94a3b8; width: 100%;">Connecting to database nodes...</p>
        </div>
    </div>

    <div id="uploadModal" class="modal-overlay">
        <div class="auth-card">
            <button class="close-btn" onclick="closeModal('uploadModal')">&times;</button>
            <h2 style="margin-top:0; color:white;">Publish to Feed</h2>
            <div class="form-group"><label>Image URL</label><input type="text" id="postImgUrl" placeholder="https://i.imgur.com/..."></div>
            <div class="form-group"><label>Title</label><input type="text" id="postTitle"></div>
            <div class="form-group"><label>Caption</label><textarea id="postCaption" rows="3"></textarea></div>
            <button class="action-btn" onclick="submitPhoto()">Publish</button>
        </div>
    </div>

    <div id="loginModal" class="modal-overlay"><div class="auth-card"><button class="close-btn" onclick="closeModal('loginModal')">&times;</button><h2 style="color:white; margin-top:0;">Log In</h2><form id="loginForm"><div class="form-group"><label>Username</label><input type="text" id="loginUser" required></div><div class="form-group"><label>Password</label><input type="password" id="loginPass" required></div><button type="submit" class="action-btn">Enter</button></form></div></div>
    
    <div id="signupModal" class="modal-overlay"><div class="auth-card"><button class="close-btn" onclick="closeModal('signupModal')">&times;</button><h2 style="color:white; margin-top:0;">Sign Up</h2><form id="signupForm"><div class="form-group"><label>Username</label><input type="text" id="signupUser" required></div><div class="form-group"><label>Email</label><input type="email" id="signupEmail" required></div><div class="form-group"><label>Password</label><input type="password" id="signupPass" required></div><div class="form-group"><label>Key</label><input type="password" id="signupKey" required placeholder="swiper no swiping"></div><button type="submit" class="action-btn">Create Profile</button></form></div></div>

    <script>
        const API_BASE_URL = "";
        let currentUser = localStorage.getItem('rec_user') || null;

        function initSession() {
            if (currentUser) {
                document.getElementById('loggedOutNav').style.display = 'none';
                document.getElementById('loggedInNav').style.display = 'block';
                document.getElementById('sidebarUsername').innerText = currentUser;
                document.getElementById('sidebarPfp').src = localStorage.getItem('rec_pfp') || "https://i.imgur.com/6VB896R.png";
                document.getElementById('navSettings').style.display = 'flex';
                document.getElementById('uploadBtn').style.display = 'flex';
            }
            loadFeed();
        }

        function openModal(id) { document.getElementById(id).classList.add('active'); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }
        function logout() { localStorage.clear(); location.reload(); }

        document.getElementById('loginForm').addEventListener('submit', async(e)=>{
            e.preventDefault();
            try {
                const response = await fetch(`${API_BASE_URL}/api/login`, {
                    method: 'POST', headers: {'Content-Type':'application/json'},
                    body: JSON.stringify({ username: document.getElementById('loginUser').value, password: document.getElementById('loginPass').value })
                });
                const data = await response.json();
                if(data.success) {
                    localStorage.setItem('rec_user', data.user.username);
                    localStorage.setItem('rec_pfp', data.user.pfpUrl);
                    location.reload();
                }
            } catch(err){}
        });

        async function submitPhoto() {
            const imageUrl = document.getElementById('postImgUrl').value;
            const title = document.getElementById('postTitle').value;
            const caption = document.getElementById('postCaption').value;
            if(!imageUrl || !title) return;
            try {
                const res = await fetch(`${API_BASE_URL}/api/photos`, {
                    method: 'POST', headers: {'Content-Type':'application/json'},
                    body: JSON.stringify({ username: currentUser, imageUrl, title, caption })
                });
                const data = await res.json();
                if(data.success) location.reload();
            } catch(e){}
        }

        async function loadFeed() {
            const container = document.getElementById('photoFeed');
            try {
                const response = await fetch(`${API_BASE_URL}/api/photos`);
                const data = await response.json();
                if(!data.success || data.photos.length === 0) {
                    container.innerHTML = `<p style="color:#94a3b8;">No data in feed.</p>`; return;
                }
                container.innerHTML = "";
                for(let photo of data.photos) {
                    const card = document.createElement('div');
                    card.className = "post-card";
                    card.innerHTML = `
                        <img src="${photo.imageUrl}" class="post-img" onerror="this.style.display='none'">
                        <div class="post-info">
                            <div class="post-title">${photo.title}</div>
                            <div class="post-author"><i class="fa-solid fa-user"></i> @${photo.username}</div>
                        </div>
                    `;
                    container.appendChild(card);
                }
            } catch(e){}
        }

        window.onload = initSession;
    </script>
</body>
    </html>
