<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UnaNet // Player Hub</title>
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; background-color: #0f1115; color: #f1f5f9; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 15px 30px; background-color: #181c24; border-bottom: 3px solid #ff5722; }
        .logo-group { display: flex; align-items: center; gap: 20px; }
        .logo { font-size: 24px; font-weight: 900; color: #ff5722; text-transform: uppercase; cursor: pointer; }
        nav a { color: #94a3b8; text-decoration: none; font-weight: 600; margin-right: 15px; font-size: 14px; }
        nav a:hover { color: #ff5722; }
        
        .nav-auth-buttons button, .user-badge button { background: transparent; border: 1px solid #334155; color: #f1f5f9; padding: 8px 16px; border-radius: 20px; font-weight: bold; cursor: pointer; }
        .nav-auth-buttons button:hover { border-color: #ff5722; }
        .btn-signup { background-color: #ff5722 !important; border: none !important; color: white !important; }
        
        .main-container { max-width: 1000px; margin: 30px auto; padding: 0 20px; display: grid; grid-template-columns: 2fr 1fr; gap: 25px; }
        @media (max-width: 800px) { .main-container { grid-template-columns: 1fr; } }
        
        .card { background-color: #181c24; border: 1px solid #232a36; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        .section-title { font-size: 16px; font-weight: bold; text-transform: uppercase; color: #94a3b8; border-bottom: 1px solid #232a36; padding-bottom: 8px; margin-bottom: 15px; }
        
        .feed-post { background-color: #1c212c; border: 1px solid #2d3646; border-radius: 8px; overflow: hidden; margin-bottom: 20px; }
        .post-header { padding: 12px; display: flex; align-items: center; gap: 10px; background-color: #181c24; }
        .post-pfp { width: 35px; height: 35px; border-radius: 50%; border: 1px solid #ff5722; object-fit: cover; }
        .post-user { font-weight: bold; color: #ff5722; cursor: pointer; }
        .post-img { width: 100%; max-height: 400px; object-fit: contain; background: #0f1115; display: block; }
        
        .comments-box { background: #131720; padding: 12px; border-top: 1px solid #232a36; }
        .comment-item { font-size: 13px; margin-bottom: 6px; }
        .comment-input-row { display: flex; gap: 8px; margin-top: 10px; }
        .comment-input-row input { flex-grow: 1; padding: 8px; background: #181c24; border: 1px solid #232a36; color: white; border-radius: 6px; }
        .comment-input-row button { background: #ff5722; border: none; color: white; font-weight: bold; padding: 0 12px; border-radius: 6px; cursor: pointer; }

        /* General Forms */
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; color: #94a3b8; font-size: 12px; margin-bottom: 4px; }
        .form-group input, .form-group textarea { width: 100%; padding: 10px; background: #0f1115; border: 1px solid #232a36; color: white; border-radius: 6px; box-sizing: border-box; }
        .action-btn { width: 100%; padding: 10px; background: #ff5722; border: none; color: white; font-weight: bold; border-radius: 6px; cursor: pointer; }

        /* Modals */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center; z-index: 1000; opacity: 0; pointer-events: none; }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .auth-card { background: #181c24; padding: 25px; border-radius: 12px; width: 100%; max-width: 360px; position: relative; }
        .close-btn { position: absolute; top: 10px; right: 15px; background: none; border: none; color: white; font-size: 20px; cursor: pointer; }

        .profile-card { background: #181c24; border: 2px solid #ff5722; border-radius: 12px; padding: 20px; text-align: center; max-width: 300px; width: 100%; }
        .large-pfp { width: 80px; height: 80px; border-radius: 50%; border: 2px solid #ff5722; object-fit: cover; margin-bottom: 10px; }
    </style>
</head>
<body>

    <header>
        <div class="logo-group">
            <div class="logo" onclick="location.reload()">UnaNet</div>
            <nav>
                <a href="/">Feed</a>
                <a href="/rules">Rules</a>
                <a href="/settings" id="navSettingsLink" style="display:none;">Settings</a>
            </nav>
        </div>
        <div id="loggedOutNav" class="nav-auth-buttons">
            <button onclick="openModal('loginModal')">Login</button>
            <button class="btn-signup" onclick="openModal('signupModal')">Sign Up</button>
        </div>
        <div id="loggedInNav" class="user-badge" style="display: none; align-items: center; gap: 10px;">
            <img src="" id="headerPfp" style="width:30px; height:30px; border-radius:50%; object-fit:cover;">
            <span id="navUsername" class="username-display" style="cursor:pointer; font-weight:bold; color:#ff5722;">Player</span>
            <button onclick="logout()">Logout</button>
        </div>
    </header>

    <div class="main-container">
        <div>
            <div class="section-title">Community Timeline</div>
            <div id="photoFeed"><p style="color:#94a3b8;">Sourcing timeline streams...</p></div>
        </div>

        <div>
            <div class="card" id="uploadWidget" style="display:none;">
                <div class="section-title">Share a Concept Link</div>
                <div class="form-group"><label>Reference Web URL</label><input type="text" id="postImgUrl" placeholder="https://..."></div>
                <div class="form-group"><label>Header / Title</label><input type="text" id="postTitle"></div>
                <div class="form-group"><label>Field Notes</label><textarea id="postCaption" rows="2"></textarea></div>
                <button class="action-btn" onclick="submitPhoto()">Publish to Feed</button>
                <div id="uploadMessage" style="margin-top:10px; font-size:12px; text-align:center;"></div>
            </div>
            <div class="card" id="guestWidget"><p style="color:#94a3b8; font-size:13px; margin:0; text-align:center;">Sign in to broadcast concepts onto UnaNet.</p></div>
        </div>
    </div>

    <div id="signupModal" class="modal-overlay"><div class="auth-card"><button class="close-btn" onclick="closeModal('signupModal')">&times;</button><h3>Create Player Profile</h3><form id="signupForm"><div class="form-group"><label>Username</label><input type="text" id="signupUser" required></div><div class="form-group"><label>Email</label><input type="email" id="signupEmail" required></div><div class="form-group"><label>Password</label><input type="password" id="signupPass" required></div><div class="form-group"><label>System Activation Key</label><input type="password" id="signupKey" required placeholder="swiper no swiping"></div><button type="submit" class="action-btn">Register Player</button></form><div id="signupMessage" class="message"></div></div></div>
    <div id="loginModal" class="modal-overlay"><div class="auth-card"><button class="close-btn" onclick="closeModal('loginModal')">&times;</button><h3>Authenticate Player Profile</h3><form id="loginForm"><div class="form-group"><label>Username</label><input type="text" id="loginUser" required></div><div class="form-group"><label>Password</label><input type="password" id="loginPass" required></div><button type="submit" class="action-btn">Login</button></form><div id="loginMessage" class="message"></div></div></div>
    
    <div id="profileModal" class="modal-overlay" onclick="if(event.target===this) closeModal('profileModal')">
        <div class="profile-card">
            <button class="close-btn" onclick="closeModal('profileModal')">&times;</button>
            <img src="" id="profPfp" class="large-pfp">
            <h2 id="profUsername" style="margin:5px 0; color:white;">--</h2>
            <div id="profStatus" style="color:#ff5722; font-size:12px; font-weight:bold; margin-bottom:12px;">PLAYER</div>
            <p id="profBio" style="font-size:13px; color:#94a3b8; background:#0f1115; padding:10px; border-radius:6px; text-align:left;"></p>
            <div style="font-size:11px; color:#475569;" id="profJoinedDate">--</div>
        </div>
    </div>

    <script>
        const API_BASE_URL = "";
        let currentUser = localStorage.getItem('rec_user') || null;

        function initSession() {
            if (currentUser) {
                document.getElementById('loggedOutNav').style.display = 'none';
                document.getElementById('loggedInNav').style.display = 'flex';
                document.getElementById('navUsername').innerText = currentUser;
                document.getElementById('headerPfp').src = localStorage.getItem('rec_pfp') || "https://i.imgur.com/6VB896R.png";
                document.getElementById('navSettingsLink').style.display = 'inline-block';
                document.getElementById('uploadWidget').style.display = 'block';
                document.getElementById('guestWidget').style.display = 'none';
                document.getElementById('navUsername').onclick = () => viewUserProfile(currentUser);
            }
            loadFeed();
        }

        function openModal(id) { document.getElementById(id).classList.add('active'); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }
        function logout() { localStorage.clear(); location.reload(); }

        async function viewUserProfile(username) {
            openModal('profileModal');
            try {
                const response = await fetch(`${API_BASE_URL}/api/user/profile/${username}`);
                const data = await response.json();
                if (data.success) {
                    document.getElementById('profUsername').innerText = `@${data.profile.username}`;
                    document.getElementById('profPfp').src = data.profile.pfpUrl;
                    document.getElementById('profStatus').innerText = data.profile.status;
                    document.getElementById('profBio').innerText = data.profile.bio;
                    document.getElementById('profJoinedDate').innerText = `Joined Grid: ${new Date(data.profile.joined).toLocaleDateString()}`;
                }
            } catch(e) { }
        }

        document.getElementById('signupForm').addEventListener('submit', async(e)=>{
            e.preventDefault();
            try {
                const response = await fetch(`${API_BASE_URL}/api/signup`, {
                    method: 'POST',
                    headers: {'Content-Type':'application/json'},
                    body: JSON.stringify({
                        username: document.getElementById('signupUser').value,
                        email: document.getElementById('signupEmail').value,
                        password: document.getElementById('signupPass').value,
                        signupKey: document.getElementById('signupKey').value
                    })
                });
                const data = await response.json();
                if(data.success) { closeModal('signupModal'); openModal('loginModal'); }
            } catch(err){}
        });

        document.getElementById('loginForm').addEventListener('submit', async(e)=>{
            e.preventDefault();
            try {
                const response = await fetch(`${API_BASE_URL}/api/login`, {
                    method: 'POST',
                    headers: {'Content-Type':'application/json'},
                    body: JSON.stringify({
                        username: document.getElementById('loginUser').value,
                        password: document.getElementById('loginPass').value
                    })
                });
                const data = await response.json();
                if(data.success) {
                    localStorage.setItem('rec_user', data.user.username);
                    localStorage.setItem('rec_pfp', data.user.pfpUrl);
                    localStorage.setItem('rec_status', data.user.status);
                    localStorage.setItem('rec_bio', data.user.bio);
                    localStorage.setItem('rec_2fa', data.user.twoFactorEnabled);
                    location.reload();
                }
            } catch(err){}
        });

        async function submitPhoto() {
            const imageUrl = document.getElementById('postImgUrl').value;
            const title = document.getElementById('postTitle').value;
            const caption = document.getElementById('postCaption').value;
            if(!imageUrl || !title) return;
            try {
                const res = await fetch(`${API_BASE_URL}/api/photos`, {
                    method: 'POST',
                    headers: {'Content-Type':'application/json'},
                    body: JSON.stringify({ username: currentUser, imageUrl, title, caption })
                });
                const data = await res.json();
                if(data.success) { location.reload(); }
            } catch(e){}
        }

        async function loadFeed() {
            const container = document.getElementById('photoFeed');
            try {
                const response = await fetch(`${API_BASE_URL}/api/photos`);
                const data = await response.json();
                if(!data.success || data.photos.length === 0) {
                    container.innerHTML = `<p style="color:#94a3b8; text-align:center;">The feed track is empty.</p>`;
                    return;
                }
                container.innerHTML = "";
                for(let photo of data.photos) {
                    // Fetch poster's pfp dynamically
                    const pRes = await fetch(`${API_BASE_URL}/api/user/profile/${photo.username}`);
                    const pData = await pRes.json();
                    const currentPfp = pData.success ? pData.profile.pfpUrl : "https://i.imgur.com/6VB896R.png";

                    let commentsMarkup = "";
                    photo.comments.forEach(c => {
                        commentsMarkup += `<div class="comment-item"><span class="post-user" onclick="viewUserProfile('${c.username}')">${c.username}:</span> <span style="color:#cbd5e1;">${c.text}</span></div>`;
                    });

                    const card = document.createElement('div');
                    card.className = "feed-post";
                    card.innerHTML = `
                        <div class="post-header">
                            <img src="${currentPfp}" class="post-pfp">
                            <span class="post-user" onclick="viewUserProfile('${photo.username}')">@${photo.username}</span>
                        </div>
                        <img src="${photo.imageUrl}" class="post-img" onerror="this.style.display='none'">
                        <div style="padding:15px;">
                            <div class="photo-title">${photo.title}</div>
                            <p style="color:#94a3b8; font-size:13px; margin:5px 0 0 0;">${photo.caption || ""}</p>
                        </div>
                        <div class="comments-box">
                            <div class="comment-list">${commentsMarkup || '<span style="color:#475569; font-size:12px;">No replies.</span>'}</div>
                            <div class="comment-input-row">
                                <input type="text" id="comment-input-${photo._id}" placeholder="${currentUser?'Add a public reply...':'Login to reply...'}" ${currentUser?'':'disabled'}>
                                <button onclick="postComment('${photo._id}')" ${currentUser?'':'disabled'}>Reply</button>
                            </div>
                        </div>
                    `;
                    container.appendChild(card);
                }
            } catch(e){}
        }

        async function postComment(id) {
            const val = document.getElementById(`comment-input-${id}`).value;
            if(!val.trim()) return;
            try {
                await fetch(`${API_BASE_URL}/api/photos/${id}/comment`, {
                    method: 'POST',
                    headers: {'Content-Type':'application/json'},
                    body: JSON.stringify({ username: currentUser, text: val })
                });
                location.reload();
            } catch(e){}
        }

        window.onload = initSession;
    </script>
</body>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                               </html>
