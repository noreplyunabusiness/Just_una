<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UnaNet // The Universe</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { margin: 0; font-family: sans-serif; background: #0b0c10; color: #f1f5f9; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 240px; background: #151821; border-right: 1px solid #232a36; display: flex; flex-direction: column; padding: 20px 0; }
        .logo { font-size: 24px; font-weight: 900; color: #ff5722; text-transform: uppercase; padding: 0 20px 20px 20px; }
        .nav-links { flex-grow: 1; display: flex; flex-direction: column; }
        .nav-item { padding: 12px 20px; color: #94a3b8; text-decoration: none; font-weight: 600; display: flex; align-items: center; gap: 10px; }
        .nav-item:hover, .nav-item.active { background: rgba(255,87,34,0.1); color: #ff5722; }
        .auth-panel { padding: 20px; border-top: 1px solid #232a36; }
        .auth-panel button { width: 100%; margin-bottom: 8px; padding: 10px; background: transparent; border: 1px solid #334155; color: #f1f5f9; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .main-content { flex-grow: 1; overflow-y: auto; padding: 25px; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; }
        .post-card { background: #151821; border: 1px solid #232a36; border-radius: 10px; overflow: hidden; cursor: pointer; }
        .post-img { width: 100%; height: 180px; object-fit: cover; }
        .post-info { padding: 12px; }
        .post-title { font-weight: bold; color: white; margin-bottom: 4px; }
        .post-author { font-size: 12px; color: #ff5722; font-weight: bold; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-overlay.active { display: flex; }
        .auth-card { background: #151821; padding: 25px; border-radius: 10px; width: 90%; max-width: 320px; border: 1px solid #232a36; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; color: #94a3b8; font-size: 12px; margin-bottom: 4px; }
        .form-group input, .form-group textarea { width: 100%; padding: 8px; background: #0b0c10; border: 1px solid #232a36; color: white; border-radius: 6px; box-sizing: border-box; }
        .action-btn { width: 100%; padding: 10px; background: #ff5722; border: none; color: white; font-weight: bold; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo" onclick="location.reload()">UnaNet</div>
        <div class="nav-links">
            <div class="nav-item active"><i class="fa-solid fa-image"></i> Feed</div>
            <a href="/rooms" class="nav-item"><i class="fa-solid fa-gamepad"></i> Rooms</a>
            <a href="/rules" class="nav-item"><i class="fa-solid fa-book"></i> Guidelines</a>
            <a href="/settings" class="nav-item" id="navSettings" style="display:none;"><i class="fa-solid fa-gear"></i> Settings</a>
        </div>
        <div class="auth-panel" id="loggedOutNav">
            <button onclick="openModal('loginModal')">Log In</button>
            <button style="background:#ff5722; border:none; color:white;" onclick="openModal('signupModal')">Sign Up</button>
        </div>
        <div class="auth-panel" id="loggedInNav" style="display:none;">
            <div style="display:flex; align-items:center; gap:10px; cursor:pointer;" id="userProfileBtn">
                <img src="" id="sidebarPfp" style="width:32px; height:32px; border-radius:50%; object-fit:cover; border:1px solid #ff5722;">
                <span id="sidebarUsername" style="font-weight:bold; font-size:13px;">Player</span>
            </div>
            <button style="margin-top:10px; border-color:#f44336; color:#f44336;" onclick="logout()">Logout</button>
        </div>
    </div>
    <div class="main-content">
        <div class="top-bar"><h2>Community Feed</h2><button style="background:#ff5722; color:white; border:none; padding:8px 16px; border-radius:6px; font-weight:bold; cursor:pointer; display:none;" id="uploadBtn" onclick="openModal('uploadModal')">Publish</button></div>
        <div class="grid-container" id="photoFeed"><p style="color:#94a3b8;">Loading feed network...</p></div>
    </div>
    <div id="uploadModal" class="modal-overlay"><div class="auth-card"><h3 style="margin:0 0 10px 0;">Publish</h3><div class="form-group"><label>Image Link</label><input type="text" id="postImgUrl"></div><div class="form-group"><label>Title</label><input type="text" id="postTitle"></div><div class="form-group"><label>Caption</label><textarea id="postCaption" rows="2"></textarea></div><button class="action-btn" onclick="submitPhoto()">Send</button></div></div>
    <div id="loginModal" class="modal-overlay"><div class="auth-card"><h3 style="margin:0 0 10px 0;">Log In</h3><form id="loginForm"><div class="form-group"><label>Username</label><input type="text" id="loginUser" required></div><div class="form-group"><label>Password</label><input type="password" id="loginPass" required></div><button type="submit" class="action-btn">Login</button></form></div></div>
    <div id="signupModal" class="modal-overlay"><div class="auth-card"><h3 style="margin:0 0 10px 0;">Sign Up</h3><form id="signupForm"><div class="form-group"><label>Username</label><input type="text" id="signupUser" required></div><div class="form-group"><label>Email</label><input type="email" id="signupEmail" required></div><div class="form-group"><label>Password</label><input type="password" id="signupPass" required></div><div class="form-group"><label>Key</label><input type="password" id="signupKey" required placeholder="swiper no swiping"></div><button type="submit" class="action-btn">Register</button></form></div></div>
    <script>
        const API_BASE_URL = "/"; let currentUser = localStorage.getItem('rec_user') || null;
        function initSession() {
            if (currentUser) {
                document.getElementById('loggedOutNav').style.display = 'none'; document.getElementById('loggedInNav').style.display = 'block';
                document.getElementById('sidebarUsername').innerText = currentUser;
                document.getElementById('sidebarPfp').src = localStorage.getItem('rec_pfp') || "https://i.imgur.com/6VB896R.png";
                document.getElementById('navSettings').style.display = 'block'; document.getElementById('uploadBtn').style.display = 'block';
                document.getElementById('userProfileBtn').onclick = () => { window.location.href = "/user/" + currentUser; };
            }
            loadFeed();
        }
        function openModal(id) { document.getElementById(id).classList.add('active'); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }
        function logout() { localStorage.clear(); location.reload(); }
        window.onclick = (e) => { if(e.target.classList.contains('modal-overlay')) { e.target.classList.remove('active'); } };
        document.getElementById('loginForm').addEventListener('submit', async(e)=>{
            e.preventDefault();
            try {
                const res = await fetch(API_BASE_URL + 'api/login', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ username: document.getElementById('loginUser').value, password: document.getElementById('loginPass').value }) });
                const data = await res.json(); if(data.success) { localStorage.setItem('rec_user', data.user.username); localStorage.setItem('rec_pfp', data.user.pfpUrl); location.reload(); }
            } catch(err){}
        });
        document.getElementById('signupForm').addEventListener('submit', async(e)=>{
            e.preventDefault();
            try {
                const res = await fetch(API_BASE_URL + 'api/signup', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ username: document.getElementById('signupUser').value, email: document.getElementById('signupEmail').value, password: document.getElementById('signupPass').value, signupKey: document.getElementById('signupKey').value }) });
                const data = await res.json(); if(data.success) { closeModal('signupModal'); openModal('loginModal'); }
            } catch(err){}
        });
        async function submitPhoto() {
            const imageUrl = document.getElementById('postImgUrl').value; const title = document.getElementById('postTitle').value; const caption = document.getElementById('postCaption').value; if(!imageUrl || !title) return;
            try { const res = await fetch(API_BASE_URL + 'api/photos', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ username: currentUser, imageUrl, title, caption }) }); const data = await res.json(); if(data.success) location.reload(); } catch(e){}
        }
        async function loadFeed() {
            const container = document.getElementById('photoFeed');
            try {
                const response = await fetch(API_BASE_URL + 'api/photos'); const data = await response.json();
                if(!data.success || data.photos.length === 0) { container.innerHTML = '<p style="color:#94a3b8;">Feed is empty.</p>'; return; }
                container.innerHTML = "";
                data.photos.forEach(photo => {
                    const card = document.createElement('div'); card.className = "post-card";
                    card.innerHTML = '<img src="' + photo.imageUrl + '" class="post-img"><div class="post-info"><div class="post-title">' + photo.title + '</div><div class="post-author">@' + photo.username + '</div></div>';
                    card.onclick = () => { window.location.href = "/user/" + photo.username; }; container.appendChild(card);
                });
            } catch(e){}
        }
        window.onload = initSession;
    </script>
</body>
</html>
