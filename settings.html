<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Just Una! // Player Settings</title>
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; background-color: #0f1115; color: #f1f5f9; }
        header { display: flex; align-items: center; padding: 15px 30px; background-color: #181c24; border-bottom: 3px solid #ff5722; gap: 20px; }
        .logo { font-size: 24px; font-weight: 900; color: #ff5722; text-transform: uppercase; text-decoration:none; }
        nav a { color: #94a3b8; text-decoration: none; font-weight: 600; margin-right: 15px; font-size: 14px; }
        nav a:hover { color: #ff5722; }
        .container { max-width: 600px; margin: 40px auto; padding: 0 20px; }
        .card { background-color: #181c24; border: 1px solid #232a36; border-radius: 12px; padding: 30px; }
        h1 { margin-top: 0; border-bottom: 1px solid #232a36; padding-bottom: 10px; font-size: 22px; color: white; text-transform: uppercase; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; color: #94a3b8; font-size: 13px; margin-bottom: 6px; font-weight: bold; }
        .form-group input, .form-group textarea { width: 100%; padding: 11px; background: #0f1115; border: 1px solid #232a36; color: white; border-radius: 8px; box-sizing: border-box; }
        .form-group input:focus, .form-group textarea:focus { outline:none; border-color:#ff5722; }
        .action-btn { width: 100%; padding: 12px; background: #ff5722; border: none; color: white; font-weight: bold; border-radius: 8px; cursor: pointer; font-size:14px; }
        .toggle-container { display: flex; align-items: center; justify-content: space-between; background: #0f1115; padding: 12px; border: 1px solid #232a36; border-radius: 8px; }
    </style>
</head>
<body>
    <header>
        <a href="/" class="logo">UnaNet</a>
        <nav><a href="/">Feed</a><a href="/settings" style="color:#ff5722;">Settings</a></nav>
    </header>
    <div class="container">
        <div class="card">
            <h1>Player Account Control</h1>
            <div class="form-group"><label>Custom Badge Status</label><input type="text" id="setTagline"></div>
            <div class="form-group"><label>Avatar Image Path (Direct URL)</label><input type="text" id="setPfp" placeholder="https://i.imgur.com/..."></div>
            <div class="form-group"><label>Player Biography</label><textarea id="setBio" rows="3"></textarea></div>
            
            <div class="form-group">
                <label>Security Matrix</label>
                <div class="toggle-container">
                    <span style="font-size:13px; color:#cbd5e1;">Enable 2-Factor Authentication (Pre-Alpha Setup)</span>
                    <input type="checkbox" id="set2FA" style="width:auto; cursor:pointer;">
                </div>
            </div>
            
            <button class="action-btn" onclick="savePlayerSettings()">Update Profile Array</button>
            <div id="statusAlert" style="margin-top:15px; text-align:center; font-size:13px; font-weight:bold;"></div>
        </div>
    </div>

    <script>
        const API_BASE_URL = "";
        const user = localStorage.getItem('rec_user');

        if(!user) { window.location.href = "/"; }

        document.getElementById('setTagline').value = localStorage.getItem('rec_status') || "Just Una Player";
        document.getElementById('setPfp').value = localStorage.getItem('rec_pfp') || "https://i.imgur.com/6VB896R.png";
        document.getElementById('setBio').value = localStorage.getItem('rec_bio') || "Greetings!";
        document.getElementById('set2FA').checked = localStorage.getItem('rec_2fa') === "true";

        async function savePlayerSettings() {
            const alertBox = document.getElementById('statusAlert');
            try {
                const res = await fetch(`${API_BASE_URL}/api/user/settings/update`, {
                    method: 'POST',
                    headers: {'Content-Type':'application/json'},
                    body: JSON.stringify({
                        username: user,
                        status: document.getElementById('setTagline').value,
                        pfpUrl: document.getElementById('setPfp').value,
                        bio: document.getElementById('setBio').value,
                        twoFactorEnabled: document.getElementById('set2FA').checked
                    })
                });
                const data = await res.json();
                if(data.success) {
                    localStorage.setItem('rec_status', data.user.status);
                    localStorage.setItem('rec_pfp', data.user.pfpUrl);
                    localStorage.setItem('rec_bio', data.user.bio);
                    localStorage.setItem('rec_2fa', data.user.twoFactorEnabled);
                    alertBox.style.color = "#4caf50"; alertBox.innerText = "Player parameters synchronized cleanly!";
                }
            } catch(e) { alertBox.style.color = "#f44336"; alertBox.innerText = "Sync failure."; }
        }
    </script>
</body>
  </html>
